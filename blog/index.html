<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog｜宮古島のバルーン装飾・サプライズ情報｜DAYSBalloon</title>
<meta name="description" content="宮古島のバルーン装飾・サプライズ演出に関する情報をお届けするDAYSBalloonのブログ。ホテル客室サプライズ、プロポーズ、記念日の演出事例やヒントを発信します。">
<link rel="canonical" href="https://daysballoon-miyakojima.com/blog/">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Blog｜宮古島のバルーン装飾・サプライズ情報｜DAYSBalloon">
<meta property="og:description" content="宮古島のバルーン装飾・サプライズ演出に関する情報をお届けします。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://daysballoon-miyakojima.com/blog/">
<meta property="og:image" content="https://daysballoon-miyakojima.com/photo_019.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans JP",sans-serif;background:#F5F0EA;color:#1A1A1A;line-height:1.8;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
.site-header{padding:28px 0;border-bottom:1px solid rgba(168,137,71,.25)}
.site-header .logo{font-family:"Cormorant Garamond",serif;font-size:1.6rem;letter-spacing:1px}
.site-header .logo span{color:#A88947;font-style:italic}
.page-head{text-align:center;padding:72px 0 48px}
.page-head .en{font-family:"Cormorant Garamond",serif;font-size:2.6rem;letter-spacing:2px;color:#A88947}
.page-head .jp{font-size:1rem;letter-spacing:3px;margin-top:8px;color:#555}
.page-head .intro{font-size:.95rem;color:#666;margin-top:20px}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;padding:24px 0 80px}
.post-card{display:block;background:#fff;border:1px solid rgba(168,137,71,.18);border-radius:4px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.post-card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.08)}
.post-card .body{padding:22px 22px 26px}
.post-card .meta{display:flex;gap:12px;align-items:center;font-size:.72rem;color:#A88947;letter-spacing:1px;margin-bottom:12px}
.post-card .cat{border:1px solid rgba(168,137,71,.4);border-radius:999px;padding:2px 10px}
.post-card h2{font-size:1.05rem;font-weight:500;line-height:1.6;margin-bottom:10px}
.post-card p{font-size:.85rem;color:#666;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:80px 0 120px;color:#888}
.empty .balloon{font-size:2rem;margin-bottom:16px}
.back{text-align:center;padding:0 0 80px}
.back a{display:inline-block;border:1px solid #A88947;color:#A88947;padding:12px 32px;font-size:.85rem;letter-spacing:2px;border-radius:999px;transition:background .3s,color .3s}
.back a:hover{background:#A88947;color:#fff}
.site-footer{border-top:1px solid rgba(168,137,71,.25);padding:32px 0;text-align:center;font-size:.78rem;color:#888;letter-spacing:1px}
@media(max-width:768px){.blog-grid{grid-template-columns:1fr;gap:20px}.page-head{padding:48px 0 32px}.page-head .en{font-size:2rem}}
</style>
</head>
<body>
<header class="site-header">
<div class="wrap"><a href="/" class="logo">DAYS<span>Balloon</span></a></div>
</header>
<main class="wrap">
<div class="page-head">
<div class="en">Blog</div>
<div class="jp">最新の記事</div>
<p class="intro">宮古島のバルーン装飾・サプライズ演出に関する情報を、定期的にお届けします。</p>
</div>
<div id="blogGrid" class="blog-grid"></div>
<div id="blogEmpty" class="empty" style="display:none">
<div class="balloon">🎈</div>
<p>記事は近日公開予定です。</p>
</div>
</main>
<div class="back"><a href="/">← トップページへ戻る</a></div>
<footer class="site-footer">
<div class="wrap">© DAYSBalloon 宮古島 — Miyakojima Balloon Decoration &amp; Surprise</div>
</footer>
<script>
(async function(){
  var grid=document.getElementById('blogGrid');
  var empty=document.getElementById('blogEmpty');
  try{
    var res=await fetch('/blog/index.json',{cache:'no-store'});
    if(!res.ok)throw new Error('no json');
    var posts=await res.json();
    if(!Array.isArray(posts)||posts.length===0){grid.style.display='none';empty.style.display='block';return;}
    grid.innerHTML=posts.map(function(p){
      return '<a class="post-card" href="/blog/'+p.slug+'.html">'+
        '<div class="body">'+
        '<div class="meta"><span class="cat">'+(p.category||'')+'</span><span>'+(p.date||'')+'</span></div>'+
        '<h2>'+(p.title||'')+'</h2>'+
        '<p>'+(p.description||'')+'</p>'+
        '</div></a>';
    }).join('');
  }catch(e){
    grid.style.display='none';empty.style.display='block';
  }
})();
</script>
</body>
</html>
